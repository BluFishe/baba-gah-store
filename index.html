<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>baba-gah liquid chalk</title>
<link href="./vendor/fonts.css" rel="stylesheet"><style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(140,155,175,0.3); border-radius: 3px; }
html, body { height: 100%; }
body { background: #0c0c0f; font-family: Arial, Helvetica, sans-serif; color: #fff; overflow: hidden; }

#skyCanvas { position: fixed; top: -1px; left: -1px; width: calc(100vw + 2px); height: calc(100vh + 2px); z-index: 0; }
#rockCanvas { position: fixed; top: -1px; left: -1px; width: calc(100vw + 2px); height: calc(100vh + 2px); z-index: 2; }
#model-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
/* Stone fill revealed behind a bottom overscroll (instead of the sky); only at the page end */
#overFill { position: fixed; left: 0; bottom: 0; width: 100%; height: 60vh; z-index: 2; pointer-events: none; display: none;
  background: linear-gradient(180deg, #494d54 0%, #34373d 45%, #24262b 100%); }
body.at-bottom #overFill { display: block; }
/* Desktop native-scroll rock: pre-rendered full-height canvas that scrolls with .content */
#rockScroll { position: absolute; top: 0; left: -8px; width: calc(100% + 16px); height: 0; z-index: -1; pointer-events: none; display: block; }
body.rock-native #rockCanvas { display: none; }
body:not(.rock-native) #rockScroll { display: none; }

#app-root { position: fixed; inset: 0; z-index: 3; display: flex; flex-direction: column; }

:root {
  --stone-bg: rgba(14,16,20,0.65);
  --stone-border: rgba(140,155,175,0.18);
  --stone-border-light: rgba(160,175,195,0.28);
  --stone-text: #ffffff;
  --stone-text-dim: rgba(255,255,255,1);
  --stone-text-bright: #ffffff;
  --accent: #7eaadc;
  --accent-bright: #9ec4f0;
  --accent-dim: rgba(126,170,220,0.15);
  --gold: #9ec4f0;
  --gold-dim: rgba(126,170,220,0.12);
  --display: 'EB Garamond', Garamond, Georgia, serif;
  --body: Arial, Helvetica, sans-serif;
}
.cf { font-family: 'Noto Sans Cuneiform', serif; letter-spacing: 0.08em; color: rgba(205,209,214,0.5); text-shadow: 0 1px 1px rgba(0,0,0,0.22); }

.rock-frame {
  position: relative;
  box-shadow: 0 6px 0 rgba(30,34,42,0.9), 0 8px 24px rgba(0,0,0,0.6), 0 2px 0 rgba(70,76,88,0.5) inset, 0 -3px 0 rgba(0,0,0,0.3) inset;
}
.rock-frame > canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none; display: block;
}
.rock-frame > :not(canvas) { position: relative; z-index: 1; }
.nav-wrap { position: relative; z-index: 100; flex-shrink: 0; margin-bottom: -4px; box-shadow: 0 -1px 8px rgba(0,0,0,0.5), 0 4px 24px rgba(0,0,0,0.32), 0 2px 0 rgba(70,76,88,0.5) inset, 0 -3px 0 rgba(0,0,0,0.3) inset; }
.gallery-frame { border-radius: 4px; overflow: hidden; }
.nav {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px;
  background: none; border-bottom: none;
}
.nav-logo { height: 30px; opacity: 1; cursor: pointer; }
.nav-idol { width: 68px; height: 38px; display: block; cursor: pointer; }
.nav-wordmark { width: 168px; height: 46px; opacity: 1; display: none; cursor: pointer; }
.nav-links { display: flex; gap: 6px; }
.nav-link {
  background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.06); cursor: pointer;
  font-family: var(--display); font-size: 14px; font-weight: 400;
  color: var(--stone-text-dim); padding: 7px 16px; border-radius: 4px;
  transition: all 0.2s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 2px 4px rgba(0,0,0,0.3);
}
.nav-link:hover { color: var(--stone-text); background: rgba(0,0,0,0.35); }
.nav-link.active {
  color: var(--gold); background: rgba(0,0,0,0.4);
  border-color: rgba(140,180,220,0.25);
  box-shadow: inset 0 1px 0 rgba(140,180,220,0.1), 0 2px 4px rgba(0,0,0,0.3), 0 0 12px rgba(140,180,220,0.08);
}
.bag-btn {
  background: none; border: none; cursor: pointer; padding: 0; position: relative;
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; transition: transform 0.15s;
}
.bag-btn:hover { transform: scale(1.08); }
.bag-icon { width: 44px; height: 44px; object-fit: contain; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
.bag-btn .count { position: absolute; top: 3px; right: 4px; }
.bag-btn .count {
  background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
  min-width: 18px; height: 18px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; padding: 0 4px;
}

.content { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; scrollbar-width: none; -ms-overflow-style: none; }
.content::-webkit-scrollbar { width: 0; height: 0; display: none; }
.section { padding: 48px 32px; max-width: 960px; margin: 0 auto; }

/* Panels that the shader carves around */
.recess-panel {
  background: none; border: none; border-radius: 0; padding: 28px;
}
.cut-panel {
  background: none; border: none; border-radius: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(160,175,195,0.25);
}

.hero { display: grid; grid-template-columns: 1fr; gap: 32px; padding: 40px 32px 48px; max-width: 960px; margin: 0 auto; }
.hero-visual { aspect-ratio: 3/4; width: 100%; }
.hero-text { display: flex; flex-direction: column; justify-content: center; }
.hero h1 { font-family: var(--display); font-weight: 500; font-size: clamp(42px,8vw,78px); line-height: 0.92; color: var(--stone-text-bright); letter-spacing: -1px; margin-bottom: 20px; }
.hero h1::first-letter { text-transform: uppercase; }   /* "Liquid chalk." */
.hero h1 em { font-style: italic; color: #598ce0; }
.hero-kicker { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--stone-text-dim); margin-bottom: 20px; }
.hero-tagline { font-family: var(--display); font-style: italic; font-size: 16px; color: var(--stone-text-dim); margin-bottom: 12px; line-height: 1.4; }
.hero-desc { font-size: 14px; color: var(--stone-text-dim); line-height: 1.65; max-width: 400px; }
.hero-cuneiform { margin-top: 20px; font-size: 20px; }

.steps { display: flex; flex-direction: column; }
.step { display: flex; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--stone-border); align-items: center; }
.step:last-child { border-bottom: none; }
.step-num {
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; position: relative;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-weight: 700; font-size: 14px; color: #fff;
  text-shadow: 0 1px 1px rgba(0,0,0,0.55);
  background: radial-gradient(circle at 34% 30%, #d4e6ff 0%, #9ec4f0 32%, #5d8ec9 64%, #27497a 100%);
  box-shadow:
    inset -1px -2px 3px rgba(10,30,60,0.55),
    inset 1px 1px 2px rgba(220,235,255,0.5),
    inset 0 0 0 0.5px rgba(180,210,245,0.35),
    0 2px 5px rgba(0,0,0,0.45);
}
.step-num::after {
  content: ''; position: absolute; top: 13%; left: 21%; width: 30%; height: 23%;
  border-radius: 50%; pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 72%);
}
.step-title { font-family: var(--display); font-size: 20px; font-weight: 600; color: var(--stone-text); line-height: 1.2; margin-bottom: 6px; }
.step-desc { font-size: 14px; color: rgba(255,255,255,0.72); line-height: 1.55; max-width: 46ch; }

.prose { max-width: 820px; }
.prose p { font-size: 16px; color: var(--stone-text-dim); line-height: 1.5; margin-bottom: 18px; }
.prose p:last-child { margin-bottom: 0; }
.prose p:first-child { font-family: var(--display); font-size: clamp(22px,2.8vw,32px); color: var(--stone-text); line-height: 1.25; margin-bottom: 22px; }

.buy-grid { display: grid; grid-template-columns: 1fr; gap: 32px; }
.variant-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.variant-btn {
  background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px; padding: 14px 16px; cursor: pointer; text-align: left; transition: all 0.2s; color: var(--stone-text);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 6px rgba(0,0,0,0.3);
}
.variant-btn:hover { border-color: rgba(255,255,255,0.12); background: rgba(0,0,0,0.35); }
.variant-btn.selected {
  border-color: rgba(140,180,220,0.35); background: rgba(0,0,0,0.35);
  box-shadow: inset 0 1px 0 rgba(140,180,220,0.1), 0 2px 6px rgba(0,0,0,0.3), 0 0 16px rgba(140,180,220,0.06);
}
.variant-label { font-family: var(--display); font-size: 16px; font-weight: 500; }
.variant-sub { font-size: 12px; color: var(--stone-text-dim); margin-top: 3px; }
.variant-price { font-size: 14px; color: var(--gold); float: right; font-weight: 600; }
.add-btn {
  width: 100%; padding: 16px; border: 1px solid rgba(140,180,220,0.4);
  background: linear-gradient(180deg, rgba(140,180,220,0.2) 0%, rgba(120,160,200,0.08) 100%);
  color: var(--gold); border-radius: 4px; font-family: var(--body);
  font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s;
  box-shadow: inset 0 1px 0 rgba(180,210,240,0.15), 0 3px 8px rgba(0,0,0,0.4), 0 0 20px rgba(140,180,220,0.08);
}
.add-btn:hover {
  background: linear-gradient(180deg, rgba(140,180,220,0.3) 0%, rgba(120,160,200,0.12) 100%);
  border-color: rgba(140,180,220,0.6);
  box-shadow: inset 0 1px 0 rgba(180,210,240,0.2), 0 3px 8px rgba(0,0,0,0.4), 0 0 28px rgba(140,180,220,0.12);
}
.add-btn:active {
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(140,180,220,0.08);
  transform: translateY(1px);
}
.stock-note { font-size: 10px; color: var(--stone-text-dim); margin-top: 10px; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
.details-list { list-style: none; margin-top: 16px; }
.details-list li { font-size: 12px; color: var(--stone-text-dim); padding: 8px 0; border-bottom: 1px solid var(--stone-border); display: flex; gap: 10px; }
.details-list li span { color: var(--gold); font-size: 10px; opacity: 0.6; min-width: 18px; }
.buy-price { font-family: var(--display); font-size: clamp(34px, 4.8vw, 44px); font-weight: 500; color: var(--stone-text-bright); margin-bottom: 20px; }
.price-cur { font-size: 0.5em; font-weight: 500; color: var(--stone-text-dim); letter-spacing: 0.06em; margin-left: 5px; }
.section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #fff; font-weight: 800; font-family: var(--body); margin-bottom: 20px; }

.qty-row { display: flex; gap: 10px; align-items: stretch; margin-bottom: 16px; }
.qty-stepper {
  display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px;
  background: rgba(0,0,0,0.25);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 4px rgba(0,0,0,0.3);
}
.qty-stepper button {
  width: 36px; height: 40px; background: none; border: none;
  color: var(--stone-text-dim); font-size: 16px; cursor: pointer; transition: all 0.15s;
}
.qty-stepper button:hover { color: var(--gold); }
.qty-stepper > span { font-size: 14px; font-weight: 600; min-width: 28px; text-align: center; color: var(--stone-text); }

.pdp-wrap { display: grid; grid-template-columns: 1fr; gap: 32px; }
.pdp-main {
  aspect-ratio: 3/4; max-height: 480px; border-radius: 2px;
  background: transparent;
}
.pdp-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.pdp-thumb {
  aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 2px solid rgba(255,255,255,0.06);
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--stone-text-dim);
  background: rgba(0,0,0,0.25);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 4px rgba(0,0,0,0.3);
}
.pdp-thumb:hover { border-color: rgba(255,255,255,0.12); }
.pdp-thumb.active {
  border-color: rgba(140,180,220,0.4);
  box-shadow: inset 0 1px 0 rgba(140,180,220,0.08), 0 2px 4px rgba(0,0,0,0.3), 0 0 10px rgba(140,180,220,0.06);
}
.pdp-name { font-family: var(--display); font-weight: 500; font-size: 32px; color: var(--stone-text-bright); margin-bottom: 6px; }
.pdp-tagline { font-family: var(--display); font-style: italic; font-size: 16px; color: var(--stone-text-dim); margin-bottom: 16px; }
.breadcrumb { font-size: 12px; color: var(--stone-text-dim); margin-bottom: 16px; }
.breadcrumb button { background: none; border: none; cursor: pointer; color: var(--accent-bright); font-size: 12px; font-family: var(--body); }

.accordion { border-top: 1px solid var(--stone-border); margin-top: 24px; }
.accordion-item { border-bottom: 1px solid var(--stone-border); }
.accordion-header { width: 100%; background: none; border: none; cursor: pointer; padding: 14px 0; display: flex; justify-content: space-between; align-items: center; font-family: var(--display); font-size: 14px; font-weight: 500; color: var(--stone-text); }
.accordion-header:hover { color: var(--gold); }
.accordion-chevron { font-size: 12px; color: var(--stone-text-dim); transition: transform 0.2s; }
.accordion-chevron.open { transform: rotate(180deg); }
.accordion-body { padding: 0 0 14px; font-size: 14px; color: var(--stone-text-dim); line-height: 1.65; }

.about-img { background: rgba(14,16,22,0.5); border: 1px solid var(--stone-border); aspect-ratio: 16/9; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--stone-text-dim); }
.about-epigraph { font-size: 20px; margin-bottom: 28px; }
.about-title { font-family: var(--display); font-weight: 600; font-size: clamp(34px,5.5vw,58px); color: var(--stone-text-bright); line-height: 1.05; margin-bottom: 20px; text-transform: capitalize; }
.story-toggle { display: flex; align-items: center; justify-content: space-between; gap: 16px; width: 100%; background: none; border: none; padding: 0; cursor: pointer; text-align: left; }
.story-caret { color: var(--stone-text-bright); font-size: clamp(22px,3vw,32px); line-height: 1; transition: transform 0.25s ease; flex: 0 0 auto; }
.story-caret.open { transform: rotate(180deg); }
.story-body { margin-top: 22px; }
.about-text { font-size: clamp(14px,1.5vw,16px); color: #fff; line-height: 1.6; margin-bottom: 16px; max-width: 64ch; }
.manifesto { list-style: none; margin-top: 32px; }
.manifesto li { font-family: var(--display); font-size: 20px; font-weight: 500; color: var(--stone-text); line-height: 1.3; padding: 15px 0; border-bottom: 1px solid var(--stone-border); }
.closing-mantra { text-align: center; padding: 40px 0 20px; }
.closing-mantra .cf { font-size: 16px; }
.closing-mantra em { display: block; margin-top: 12px; font-family: var(--display); font-size: 16px; color: var(--stone-text-dim); }

.cart-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.cart-overlay.open { opacity: 1; pointer-events: auto; }
.cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(380px,90vw); z-index: 201; background: rgba(16,18,24,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-left: 1px solid var(--stone-border); transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
.cart-drawer.open { transform: translateX(0); }
.cart-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--stone-border); }
.cart-header h2 { font-family: var(--display); font-weight: 500; font-size: 20px; color: var(--stone-text-bright); }
.cart-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--stone-text-dim); padding: 4px; }
.cart-items { flex: 1; overflow-y: auto; padding: 16px 20px; }
.cart-empty { text-align: center; padding: 48px 20px; font-family: var(--display); font-style: italic; font-size: 16px; color: var(--stone-text-dim); }
.cart-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--stone-border); }
.cart-item-thumb { width: 48px; height: 48px; flex-shrink: 0; border-radius: 4px; background: rgba(14,16,22,0.5); display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--stone-text-dim); }
.cart-item-name { font-family: var(--display); font-size: 14px; font-weight: 500; color: var(--stone-text); }
.cart-item-variant { font-size: 12px; color: var(--stone-text-dim); margin-top: 2px; }
.cart-item-qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.cart-item-qty button { width: 24px; height: 24px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.25); border-radius: 3px; cursor: pointer; font-size: 14px; color: var(--stone-text-dim); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 3px rgba(0,0,0,0.3); transition: all 0.15s; }
.cart-item-qty button:hover { color: var(--gold); border-color: rgba(140,180,220,0.2); }
.cart-item-qty span { font-size: 14px; font-weight: 600; color: var(--stone-text); }
.cart-item-price { font-size: 14px; font-weight: 600; color: var(--gold); align-self: flex-start; }
.cart-footer { padding: 20px; border-top: 1px solid var(--stone-border); }
.cart-subtotal { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 14px; }
.cart-subtotal span:last-child { font-weight: 600; color: var(--gold); }
.checkout-btn {
  width: 100%; padding: 16px; border: 1px solid rgba(140,180,220,0.4);
  background: linear-gradient(180deg, rgba(140,180,220,0.2), rgba(120,160,200,0.08));
  color: var(--gold); border-radius: 4px; font-family: var(--body);
  font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s;
  box-shadow: inset 0 1px 0 rgba(180,210,240,0.15), 0 3px 8px rgba(0,0,0,0.4), 0 0 20px rgba(140,180,220,0.08);
}
.checkout-btn:hover {
  background: linear-gradient(180deg, rgba(140,180,220,0.3), rgba(120,160,200,0.12));
  border-color: rgba(140,180,220,0.6);
}
.cart-mantra { font-family: var(--display); font-style: italic; font-size: 12px; color: var(--stone-text-dim); text-align: center; margin-top: 14px; }

@media (min-width: 760px) {
  .hero { grid-template-columns: 1fr 1.2fr; gap: 48px; padding: 56px 48px; align-items: stretch; }
  .hero-visual { aspect-ratio: auto; height: 100%; min-height: 300px; }
  .section { padding: 56px 48px; }
  .buy-grid { grid-template-columns: 1fr 1fr; gap: 48px; }
  .pdp-wrap { grid-template-columns: 1.2fr 1fr; gap: 48px; }
  .pdp-wrap > .recess-panel { position: sticky; top: 80px; }
  .nav { max-width: 960px; margin: 0 auto; padding: 0 48px; }
  .nav-wordmark { display: block; }
  .nav-logo { height: 38px; }
  .nav-idol { width: 88px; height: 46px; }
  .bag-btn { width: 54px; height: 54px; }
  .bag-icon { width: 50px; height: 50px; }
}

/* ── store.html: single-SKU conversion layout (additive) ── */
/* mobile-only centered red "baba-gah" wordmark (masked SVG → red fill + faux extrusion) */
.nav-mark { display: none; }
@media (max-width: 759px) {
  .nav-mark {
    display: block; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 170px; height: 50px; cursor: pointer;
  }
}
.eyebrow { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #fff; opacity: 1; font-weight: 800; margin-bottom: 14px; font-family: var(--body); }
.stock-row { margin-top: -8px; margin-bottom: 20px; display: flex; align-items: center; gap: 9px; }   /* sits just under the price; dot centered + spaced from text */
.stock-row .stud { margin-right: 0; }
/* embedded gemstone "stud" — CSS port of the frames builder spheroid shading
   (hemisphere diffuse from an upper-left light + Blinn specular hot-spot +
   fresnel rim + contact shadow seating it into the surface) */
.stud {
  display: inline-block; width: 12px; height: 12px; border-radius: 50%;
  vertical-align: -1px; margin-right: 5px; position: relative; flex-shrink: 0;
}
.stud::after {                 /* specular hot-spot, offset toward the light */
  content: ''; position: absolute; top: 16%; left: 22%; width: 32%; height: 26%;
  border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 72%);
}
.stud-green {                  /* emerald, brightened — diffuse body + fresnel rim */
  background: radial-gradient(circle at 35% 30%,
    #ecfff2 0%, #8dffae 12%, #34e85f 36%, #14b03f 64%, #0a6b27 100%);
  box-shadow:

{ "imports": {

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

/* ===== chalk-material.js ===== */
// ──────────────────────────────────────────────────────────────────────────
// chalk-material.js procedural chalk / plaster PBR material.
// Ported from chalk-material-settings.md (exported from the Texture Viewer).
// A MeshStandardMaterial with the chalk shader injected via onBeforeCompile,
// so it keeps full scene + environment lighting.
// ──────────────────────────────────────────────────────────────────────────

const CHALK_COMMON = `
#include <common>
varying vec3 vChalkPos;
uniform float uPosScale, uLargeScale, uGrainScale, uGritScale;
uniform float uPitScale, uPitThresh, uPitDepth, uBumpStrength;
uniform float uDust, uCrackScale, uCrackAmount, uEps;
float gHeight; float gPit; float gDust; float gCrack; float gTone;

float chash31(vec3 p){
  p = fract(p * 0.3183099 + vec3(0.1, 0.2, 0.3));
  p *= 17.0;
  return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
}
float cnoise3(vec3 x){
  vec3 i = floor(x); vec3 f = fract(x);
  f = f * f * (3.0 - 2.0 * f);
  float n000 = chash31(i + vec3(0.,0.,0.));
  float n100 = chash31(i + vec3(1.,0.,0.));
  float n010 = chash31(i + vec3(0.,1.,0.));
  float n110 = chash31(i + vec3(1.,1.,0.));
  float n001 = chash31(i + vec3(0.,0.,1.));
  float n101 = chash31(i + vec3(1.,0.,1.));
  float n011 = chash31(i + vec3(0.,1.,1.));
  float n111 = chash31(i + vec3(1.,1.,1.));
  float nx00 = mix(n000, n100, f.x);
  float nx10 = mix(n010, n110, f.x);
  float nx01 = mix(n001, n101, f.x);
  float nx11 = mix(n011, n111, f.x);
  return mix(mix(nx00, nx10, f.y), mix(nx01, nx11, f.y), f.z);
}
float cfbm(vec3 p, int oct){
  float a = 0.5, s = 0.0, n = 0.0;
  for(int i = 0; i < 6; i++){
    if(i >= oct) break;
    s += a * cnoise3(p); n += a; p *= 2.02; a *= 0.5;
  }
  return s / n;
}
float chalkHeight(vec3 p, out float pit, out float dust, out float crack, out float tone){
  float large = cfbm(p * uLargeScale, 5) - 0.5;
  float grain = cfbm(p * uGrainScale, 6) - 0.5;
  float fwp = fwidth(p.x) + fwidth(p.y) + fwidth(p.z);
  float gritFade  = 1.0 - smoothstep(0.6, 1.5, fwp * uGritScale);
  float microFade = 1.0 - smoothstep(0.6, 1.5, fwp * uGritScale * 2.7);
  float grit  = (cnoise3(p * uGritScale) - 0.5) * gritFade;
  float micro = (cnoise3(p * uGritScale * 2.7) - 0.5) * microFade;
  float h = large * 0.30 + grain * 0.42 + grit * 0.16 + micro * 0.10;
  tone = large * 0.5 + grain * 0.5;
  float pn = cfbm(p * uPitScale + 13.0, 4);
  pit = smoothstep(uPitThresh, uPitThresh + 0.12, pn);
  h -= pit * uPitDepth;
  dust = smoothstep(0.60, 0.92, cfbm(p * uGrainScale * 0.45 + 31.0, 4));
  float c = cfbm(p * uCrackScale + 5.0, 4);
  crack = smoothstep(0.03, 0.0, abs(c - 0.5)) * uCrackAmount;
  h -= crack * 0.20;
  return h;
}
`;

const CHALK_MAP = `
#include <map_fragment>
{
  vec3 cp = vChalkPos * uPosScale;
  gHeight = chalkHeight(cp, gPit, gDust, gCrack, gTone);
  vec3 base = diffuseColor.rgb;
  float lum = dot(base, vec3(0.299, 0.587, 0.114));
  base *= (1.0 + gTone * 0.16);
  base = mix(base, mix(base, vec3(lum), 0.35) * 0.82, gPit * 0.6);
  vec3 dustCol = mix(base, vec3(lum), 0.4) * 1.06;
  base = mix(base, dustCol, gDust * uDust * 0.5);
  base *= (1.0 - 0.4 * gCrack);
  diffuseColor.rgb = clamp(base, 0.0, 1.0);
}
`;

const CHALK_ROUGH = `
#include <roughnessmap_fragment>
roughnessFactor = clamp(roughnessFactor * (0.96 + 0.06 * gHeight) + gPit * 0.03, 0.0, 1.0);
`;

const CHALK_NORMAL = `
#include <normal_fragment_maps>
{
  vec3 vpos = -vViewPosition;
  vec3 dpdx = dFdx(vpos);
  vec3 dpdy = dFdy(vpos);
  float dhdx = dFdx(gHeight);
  float dhdy = dFdy(gHeight);
  vec3 r1 = cross(dpdy, normal);
  vec3 r2 = cross(normal, dpdx);
  float det = dot(dpdx, r1);
  vec3 grad = sign(det) * (dhdx * r1 + dhdy * r2);
  normal = normalize(abs(det) * normal - uBumpStrength * 0.9 * grad);
}
`;

const DEFAULTS = {
  uPosScale: 2, uLargeScale: 0.6, uGrainScale: 10, uGritScale: 14,
  uPitScale: 1.6, uPitThresh: 0.66, uPitDepth: 0.28, uBumpStrength: 0.05,
  uDust: 0.23, uCrackScale: 3, uCrackAmount: 0, uEps: 0.012,
};

function createChalkMaterial(cfg = {}) {
  const c = cfg.chalk || cfg;             // accept the whole settings object or just the chalk block
  const u = c.uniforms || {};
  const uniforms = {};
  for (const k in DEFAULTS) uniforms[k] = { value: u[k] !== undefined ? u[k] : DEFAULTS[k] };

  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(c.color || 0xf0eee8),
    metalness: c.metalness ?? 0,
    roughness: c.roughness ?? 0.97,
  });
  mat.onBeforeCompile = (shader) => {
    Object.assign(shader.uniforms, uniforms);
    shader.vertexShader = shader.vertexShader
      .replace('#include <common>', '#include <common>\nvarying vec3 vChalkPos;')
      .replace('#include <begin_vertex>', '#include <begin_vertex>\nvChalkPos = transformed;');
    shader.fragmentShader = shader.fragmentShader
      .replace('#include <common>', CHALK_COMMON)
      .replace('#include <map_fragment>', CHALK_MAP)
      .replace('#include <roughnessmap_fragment>', CHALK_ROUGH)
      .replace('#include <normal_fragment_maps>', CHALK_NORMAL);
  };
  mat.customProgramCacheKey = () => 'chalk-material';
  mat.userData.chalkUniforms = uniforms;
  return mat;
}

/* ===== bottle-viewer.js ===== */
// ──────────────────────────────────────────────────────────────────────────
// bottle-viewer.js reusable renderer for SqueezeBottle.obj + a label decal.
// Consumes the config produced by bottle-editor.html (window.BOTTLE_CONFIG) and
// the bundled mesh (window.BOTTLE_OBJ). Used by both a standalone product page
// and baba-gah.html.
//
//   import { createBottleViewer } from './bottle-viewer.js';
//   createBottleViewer(canvasEl, { config, objText, interactive, autoRotate, transparentBg });
// ──────────────────────────────────────────────────────────────────────────





function createBottleViewer(canvas, opts = {}) {
  const objText = opts.objText || window.BOTTLE_OBJ;
  let cfg = opts.config || window.BOTTLE_CONFIG || {};
  const interactive = opts.interactive !== false;
  const transparentBg = !!opts.transparentBg;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = cfg.scene?.exposure ?? 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  if (!transparentBg && cfg.scene?.background) scene.background = new THREE.Color(cfg.scene.background);

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.enabled = interactive;
  controls.autoRotate = false;
  // The label is baked into the body's UV texture (device-independent), so the whole
  // bottle just spins as a normal textured mesh — same on every device.
  const spinning = !!opts.autoRotate;

  const key = new THREE.DirectionalLight(0xfff2dd, cfg.scene?.keyLight ?? 1.2);
  key.position.set(4, 6, 5); scene.add(key);
  const rim = new THREE.DirectionalLight(0xbfd4ff, 0.5); rim.position.set(-5, 3, -4); scene.add(rim);

  // ── Materials ──
  function makeMat(st) {
    return new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(st.color),
      roughness: st.rough / 100, metalness: st.metal / 100,
      clearcoat: st.coat / 100, clearcoatRoughness: st.coatR / 100,
      transmission: st.trans / 100, sheen: st.sheen / 100, sheenColor: new THREE.Color(0xffffff),
      envMapIntensity: st.env / 100, ior: 1.45, thickness: 0.6,
      transparent: st.trans > 0 || st.opac < 100, opacity: st.opac / 100,
      side: THREE.DoubleSide,
    });
  }

  // ── Model ──
  const obj = new OBJLoader().parse(objText);
  const box = new THREE.Box3().setFromObject(obj);
  const center = box.getCenter(new THREE.Vector3());
  obj.position.sub(center);
  obj.rotation.y = Math.PI;
  obj.updateMatrixWorld(true);

  let bodyMesh = null, lidMesh = null;
  obj.traverse(c => {
    if (!c.isMesh) return;
    if (!c.geometry.attributes.normal) c.geometry.computeVertexNormals();
    if (c.name === 'Lid' || /lid/i.test(c.name)) lidMesh = c; else bodyMesh = c;
  });
  const mats = cfg.materials || {};
  if (bodyMesh && mats.Body) bodyMesh.material = makeMat(mats.Body);
  if (lidMesh && mats.Lid) lidMesh.material = makeMat(mats.Lid);
  const tiltGroup = new THREE.Group();   // constant lean of the spin axis
  const spinGroup = new THREE.Group();   // rotates the bottle about that tilted axis
  tiltGroup.add(spinGroup);
  spinGroup.add(obj);
  scene.add(tiltGroup);
  if (spinning) tiltGroup.rotation.z = THREE.MathUtils.degToRad(20);   // tilted spin axis

  const bodyBox = new THREE.Box3().setFromObject(bodyMesh || obj);

  // Camera framing
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim / (2 * Math.tan(camera.fov * Math.PI / 360)) * 1.3;
  camera.position.set(dist * 0.45, size.y * 0.12, dist);
  controls.target.set(0, 0, 0);
  controls.update();

  // ── Label: baked into the body's UV texture (so it's just part of the surface) ──
  const raycaster = new THREE.Raycaster();
  raycaster.far = 30;
  let labelOverlay = null, labelTex = null, labelAspect = 612 / 174;
  let label = cfg.label || {};

  // Rasterize the label SVG to a canvas (returns the canvas + aspect).
  function rasterizeSVG(svgText, done) {
    const vb = svgText.match(/viewBox\s*=\s*["']([\d.\-\s]+)["']/i);
    let aspect = 612 / 174;
    if (vb) { const p = vb[1].trim().split(/[\s,]+/).map(Number); aspect = p[2] / p[3]; }
    const cw = 1024, ch = Math.max(1, Math.round(1024 / aspect));
    const svg = svgText
      .replace(/(<svg[^>]*?)\swidth\s*=\s*["'][^"']*["']/i, '$1')
      .replace(/(<svg[^>]*?)\sheight\s*=\s*["'][^"']*["']/i, '$1')
      .replace(/<svg/i, `<svg width="${cw}" height="${ch}"`);
    const url = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml;charset=utf-8' }));
    const img = new Image();
    img.onload = () => {
      const cnv = document.createElement('canvas'); cnv.width = cw; cnv.height = ch;
      cnv.getContext('2d').drawImage(img, 0, 0, cw, ch);
      URL.revokeObjectURL(url);
      done(cnv, aspect);
    };
    img.onerror = () => URL.revokeObjectURL(url);
    img.src = url;
  }

  // Drop decal triangles whose surface normal faces away from the label direction —
  // bakes the front-only clip into the geometry on the CPU (device-independent).
  function pruneDecalBack(geo, dir, thr) {
    const p = geo.attributes.position, nr = geo.attributes.normal, uv = geo.attributes.uv;
    const P = [], N = [], U = [];
    for (let t = 0; t < p.count; t += 3) {
      let nx = 0, ny = 0, nz = 0;
      for (let k = 0; k < 3; k++) { nx += nr.getX(t + k); ny += nr.getY(t + k); nz += nr.getZ(t + k); }
      const l = Math.hypot(nx, ny, nz) || 1;
      if ((nx / l) * dir.x + (ny / l) * dir.y + (nz / l) * dir.z < thr) continue;
      for (let k = 0; k < 3; k++) {
        P.push(p.getX(t + k), p.getY(t + k), p.getZ(t + k));
        N.push(nr.getX(t + k), nr.getY(t + k), nr.getZ(t + k));
        U.push(uv.getX(t + k), uv.getY(t + k));
      }
    }
    geo.dispose();
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(P, 3));
    g.setAttribute('normal', new THREE.Float32BufferAttribute(N, 3));
    g.setAttribute('uv', new THREE.Float32BufferAttribute(U, 2));
    return g;
  }

  // Project the label onto the body's front faces (DecalGeometry generates the correct
  // UVs — the OBJ's own UVs are degenerate on the front), prune the back, and parent it
  // to the body so it rides the surface and spins with the whole bottle. One path for
  // every device: plain textured material, no clip shader, no per-frame work.
  function buildLabelMesh() {
    if (labelOverlay) { labelOverlay.removeFromParent(); labelOverlay.geometry.dispose(); labelOverlay.material.dispose(); labelOverlay = null; }
    if (!labelTex || !bodyMesh || label.visible === false) return;
    bodyMesh.updateMatrixWorld(true);
    bodyBox.setFromObject(bodyMesh);
    const a = (label.angle || 0) * Math.PI / 180;
    const dir = new THREE.Vector3(Math.cos(a), 0, Math.sin(a));
    const y = THREE.MathUtils.lerp(bodyBox.min.y + 0.02, bodyBox.max.y - 0.02, (label.y ?? 46) / 100);
    const cx = (bodyBox.min.x + bodyBox.max.x) / 2, cz = (bodyBox.min.z + bodyBox.max.z) / 2;
    raycaster.set(new THREE.Vector3(cx + dir.x * 10, y, cz + dir.z * 10), dir.clone().negate());
    const hits = raycaster.intersectObject(bodyMesh, true);
    if (!hits.length) return;
    const hit = hits[0];
    const n = (hit.face ? hit.face.normal.clone() : dir.clone()).transformDirection(bodyMesh.matrixWorld).normalize();
    const dummy = new THREE.Object3D();
    dummy.position.copy(hit.point);
    dummy.lookAt(hit.point.clone().add(n));
    dummy.rotateZ((label.rot || 0) * Math.PI / 180);
    const w = (label.size ?? 70) / 100, h = w / labelAspect;
    const surfR = (hit.point.x - cx) * dir.x + (hit.point.z - cz) * dir.z;
    const depth = Math.min(surfR * 1.7, Math.max(0.25, w * 0.7));
    let geo = new DecalGeometry(bodyMesh, hit.point, dummy.rotation, new THREE.Vector3(w, h, depth));
    geo = pruneDecalBack(geo, dir, 0.25);
    const mat = new THREE.MeshStandardMaterial({
      map: labelTex, transparent: true, depthWrite: false, side: THREE.FrontSide,
      roughness: (label.finish ?? 45) / 100, metalness: 0, envMapIntensity: 0.5,
      opacity: (label.opacity ?? 100) / 100, polygonOffset: true, polygonOffsetFactor: -2,
    });
    labelOverlay = new THREE.Mesh(geo, mat);
    labelOverlay.renderOrder = 2;
    bodyMesh.updateWorldMatrix(true, false);
    labelOverlay.applyMatrix4(bodyMesh.matrixWorld.clone().invert());   // world decal → body-local (rides the body)
    bodyMesh.add(labelOverlay);
    // Start the spin with the label facing the camera (centered first impression).
    const q = new THREE.Quaternion(); spinGroup.getWorldQuaternion(q);
    const localDir = dir.clone().applyQuaternion(q.invert());
    spinGroup.rotation.y = Math.atan2(localDir.z, localDir.x) - Math.atan2(camera.position.z, camera.position.x);
  }

  function applyLabelTexture(svgText) {
    if (labelOverlay) { labelOverlay.removeFromParent(); labelOverlay.geometry.dispose(); labelOverlay.material.dispose(); labelOverlay = null; }
    if (labelTex) { labelTex.dispose(); labelTex = null; }
    if (!svgText || !bodyMesh || label.visible === false) return;
    rasterizeSVG(svgText, (cnv, aspect) => {
      labelAspect = aspect;
      labelTex = new THREE.CanvasTexture(cnv);
      labelTex.colorSpace = THREE.SRGBColorSpace;
      labelTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      buildLabelMesh();
    });
  }
  applyLabelTexture(label.svg);

  // ── Resize + loop ──
  let raf = 0, disposed = false;
  const spinClock = new THREE.Clock();
  function resize() {
    const w = canvas.clientWidth || canvas.parentElement?.clientWidth || 1;
    const h = canvas.clientHeight || canvas.parentElement?.clientHeight || 1;
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  }
  const ro = new ResizeObserver(resize);
  ro.observe(canvas);
  if (canvas.parentElement) ro.observe(canvas.parentElement);
  resize();

  function animate() {
    if (disposed) return;
    const dt = spinClock.getDelta();
    if (spinning) spinGroup.rotation.y += 0.8 * dt;   // whole bottle spins on the tilted axis
    controls.update();
    renderer.render(scene, camera);
    raf = requestAnimationFrame(animate);
  }
  animate();

  return {
    setConfig(next) {
      cfg = next || cfg;
      if (next?.materials?.Body && bodyMesh) bodyMesh.material = makeMat(next.materials.Body);
      if (next?.materials?.Lid && lidMesh) lidMesh.material = makeMat(next.materials.Lid);
      if (next?.scene) {
        renderer.toneMappingExposure = next.scene.exposure ?? 1.0;
        key.intensity = next.scene.keyLight ?? 1.2;
        if (!transparentBg && next.scene.background) scene.background = new THREE.Color(next.scene.background);
      }
      label = next?.label || label;
      applyLabelTexture(label.svg);
    },
    dispose() {
      disposed = true;
      cancelAnimationFrame(raf);
      ro.disconnect();
      controls.dispose();
      renderer.dispose();
    },
  };
}

/* ===== chalk-viewer.js ===== */
// ──────────────────────────────────────────────────────────────────────────
// chalk-viewer.js renders Baba.obj (the raised-hands idol, bundled as
// window.BABA_MESH) with the procedural chalk material. Used for the home hero.
//
//   import { createChalkViewer } from './chalk-viewer.js';
//   createChalkViewer(canvasEl, { config, autoRotate, interactive, transparentBg });
// ──────────────────────────────────────────────────────────────────────────




function b64ToBuffer(b64) {
  const bin = atob(b64), len = bin.length, u = new Uint8Array(len);
  for (let i = 0; i < len; i++) u[i] = bin.charCodeAt(i);
  return u.buffer;
}

function buildIdolGeometry(mesh) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(b64ToBuffer(mesh.positions)), 3));
  g.setIndex(new THREE.BufferAttribute(new Uint32Array(b64ToBuffer(mesh.index)), 1));
  g.computeVertexNormals();   // indexed → smooth shading
  g.computeBoundingBox();
  return g;
}

function createChalkViewer(canvas, opts = {}) {
  const meshData = opts.mesh || window.BABA_MESH;
  const cfg = opts.config || window.CHALK_CONFIG || {};
  const transparentBg = !!opts.transparentBg;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  if (!transparentBg && cfg.scene?.background) scene.background = new THREE.Color(cfg.scene.background);

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.enabled = !!opts.interactive;        // hero is display-only by default
  controls.autoRotate = opts.autoRotate !== false;
  controls.autoRotateSpeed = 1.2;

  const key = new THREE.DirectionalLight(0xfff4e6, 1.1); key.position.set(4, 6, 5); scene.add(key);
  const rim = new THREE.DirectionalLight(0xcfe0ff, 0.45); rim.position.set(-5, 3, -4); scene.add(rim);

  // Idol mesh
  const geo = buildIdolGeometry(meshData);
  const bb = geo.boundingBox;
  const center = bb.getCenter(new THREE.Vector3());
  geo.translate(-center.x, -center.y, -center.z);   // centre at origin
  geo.computeBoundingBox();

  const material = createChalkMaterial(cfg);
  const idol = new THREE.Mesh(geo, material);
  scene.add(idol);

  // ── Orbiting 3D wordmark ring (babagah.svg extruded, bent into a circle) ──
  let wordRing = null;
  try {
    if (opts.ring !== false && window.BABA_WORDMARK_SVG) {
      const idolBox = geo.boundingBox;
      const idolH = idolBox.max.y - idolBox.min.y;
      const idolR = Math.max(idolBox.max.x - idolBox.min.x, idolBox.max.z - idolBox.min.z) / 2;
      const paths = new SVGLoader().parse(window.BABA_WORDMARK_SVG).paths;
      const shapes = [];
      paths.forEach(p => SVGLoader.createShapes(p).forEach(s => shapes.push(s)));
      let wg = new THREE.ExtrudeGeometry(shapes, { depth: 48, bevelEnabled: true, bevelThickness: 7, bevelSize: 5, bevelSegments: 2, curveSegments: 4 });
      wg.computeBoundingBox();
      const wb = wg.boundingBox, sw = wb.max.x - wb.min.x, sh = wb.max.y - wb.min.y, sd = wb.max.z - wb.min.z;
      wg.translate(-wb.min.x, -wb.min.y, -wb.min.z);   // → 0..sw, 0..sh, 0..sd
      wg.scale(1, -1, 1); wg.translate(0, sh, 0);       // flip SVG y-down → up
      const N = 2;
      const R = idolR * 1.08;
      const unit = (2 * Math.PI * R) / N;               // arc length per wordmark + gap
      const Wm = unit / 1.5;                            // gap = 0.5 * wordmark width
      const s = Wm / sw;
      wg.scale(s, s, s);
      const depth = sd * s, gh = sh * s;
      wg.translate(0, -gh / 2, 0);                      // centre vertically
      const parts = [];
      for (let i = 0; i < N; i++) { const g = wg.clone(); g.translate(i * unit, 0, 0); parts.push(g); }
      let merged = BufferGeometryUtils.mergeGeometries(parts);
      wg.dispose(); parts.forEach(p => p.dispose());
      const pos = merged.attributes.position, v = new THREE.Vector3();
      for (let i = 0; i < pos.count; i++) {
        v.fromBufferAttribute(pos, i);
        const theta = v.x / R, r = R + (v.z - depth / 2);
        pos.setXYZ(i, r * Math.sin(theta), v.y, r * Math.cos(theta));
      }
      pos.needsUpdate = true;
      merged.deleteAttribute('normal'); merged.deleteAttribute('uv');   // weld by position for smooth shading
      merged = BufferGeometryUtils.mergeVertices(merged);
      merged.computeVertexNormals();
      const wm = createChalkMaterial({ color: '#f82538', roughness: 0.82, metalness: 0 }); wm.side = THREE.DoubleSide;
      wordRing = new THREE.Group();
      const rm = new THREE.Mesh(merged, wm);
      wordRing.add(rm);
      wordRing.rotation.x = 0.16;                        // slight orbital tilt
      wordRing.position.y = idolH * 0.04;
      scene.add(wordRing);
    }
  } catch (e) { console.warn('wordmark ring', e); }

  // Frame the camera
  const size = bb.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const navMode = opts.ring === false;          // nav idol: fill the (wide) canvas, no ring
  const oscillate = !!opts.oscillate;
  controls.autoRotate = controls.autoRotate && !oscillate;
  function frameCam() {
    const vF = camera.fov * Math.PI / 360;
    if (navMode) {                               // aspect-aware fit so a wide canvas shows a big idol
      const distH = (size.y / 2 * 1.15) / Math.tan(vF);
      const distW = (size.x / 2 * 1.1) / Math.tan(vF) / camera.aspect;
      camera.position.set(0, 0, Math.max(distH, distW));
    } else {
      camera.position.set(0, size.y * 0.05, maxDim / (2 * Math.tan(vF)) * 1.85);
    }
    camera.lookAt(0, 0, 0);
  }
  controls.target.set(0, 0, 0);
  frameCam();
  controls.update();

  let raf = 0, disposed = false;
  function resize() {
    const w = canvas.clientWidth || canvas.parentElement?.clientWidth || 1;
    const h = canvas.clientHeight || canvas.parentElement?.clientHeight || 1;
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix(); frameCam();
  }
  const ro = new ResizeObserver(resize);
  ro.observe(canvas);
  if (canvas.parentElement) ro.observe(canvas.parentElement);
  resize();

  const ringClock = new THREE.Clock();
  function animate() {
    if (disposed) return;
    if (oscillate) idol.rotation.y = 0.55 * Math.sin(ringClock.getElapsedTime() * 1.05);   // rock side to side
    if (wordRing) wordRing.rotation.y += ringClock.getDelta() * 0.35;   // orbit
    controls.update();
    renderer.render(scene, camera);
    raf = requestAnimationFrame(animate);
  }
  animate();

  return {
    dispose() {
      disposed = true;
      cancelAnimationFrame(raf);
      ro.disconnect();
      controls.dispose();
      geo.dispose();
      material.dispose();
      renderer.dispose();
    },
  };
}

// Standalone spinning red 3D "baba-gah" wordmark (same extruded look as the idol's
// orbiting ring) — used in the nav in place of the flat SVG.
function createWordmarkViewer(canvas, opts = {}) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  const scene = new THREE.Scene();
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  renderer.toneMappingExposure = 1.0;
  const camera = new THREE.PerspectiveCamera(26, 4, 0.01, 100);
  // Match the idol viewer's lighting (the orbiting ring uses the same wordmark).
  const key = new THREE.DirectionalLight(0xfff4e6, 1.1); key.position.set(4, 6, 5); scene.add(key);
  const rim = new THREE.DirectionalLight(0xcfe0ff, 0.45); rim.position.set(-5, 3, -4); scene.add(rim);

  let mark = null, mw = 1, mh = 1;
  try {
    const paths = new SVGLoader().parse(window.BABA_WORDMARK_SVG).paths;
    const shapes = [];
    paths.forEach(p => SVGLoader.createShapes(p).forEach(s => shapes.push(s)));
    // Match the idol ring's wordmark build (same extrude + local scale) so the
    // chalk grain reads identically — the noise is keyed to local vertex scale.
    let g = new THREE.ExtrudeGeometry(shapes, { depth: 48, bevelEnabled: true, bevelThickness: 7, bevelSize: 5, bevelSegments: 2, curveSegments: 4 });
    g.scale(1, -1, 1);                                 // SVG y-down → up
    g.computeBoundingBox();
    const sc = 1.91 / (g.boundingBox.max.x - g.boundingBox.min.x);   // ring's wordmark local width
    g.scale(sc, sc, sc);
    g.computeBoundingBox();
    const b = g.boundingBox; mw = b.max.x - b.min.x; mh = b.max.y - b.min.y;
    g.translate(-(b.min.x + b.max.x) / 2, -(b.min.y + b.max.y) / 2, -(b.min.z + b.max.z) / 2);
    g.deleteAttribute('normal'); g.deleteAttribute('uv');
    g = BufferGeometryUtils.mergeVertices(g); g.computeVertexNormals();
    const m = createChalkMaterial({ color: '#c01428', roughness: 0.82, metalness: 0 }); m.side = THREE.DoubleSide;
    mark = new THREE.Mesh(g, m);
    scene.add(mark);
  } catch (e) { console.warn('wordmark', e); }

  function frame() {
    const a = camera.aspect, vF = camera.fov * Math.PI / 180;
    const distH = (mh / 2 * 1.42) / Math.tan(vF / 2);
    const distW = (mw / 2 * 1.05) / Math.tan(vF / 2) / a;
    camera.position.set(0, 0, Math.max(distH, distW));
    camera.lookAt(0, 0, 0);
  }
  // Still, head-on (mark stays at rotation 0). Render a few frames then idle;
  // re-render on resize / when it becomes visible.
  let raf = 0, disposed = false;
  function renderN(n) {
    cancelAnimationFrame(raf); let i = 0;
    (function step() {
      if (disposed) return;
      if (canvas.clientWidth) { renderer.render(scene, camera); i++; }   // skip/poll while hidden
      if (i < n) raf = requestAnimationFrame(step);
    })();
  }
  function resize() {
    const w = canvas.clientWidth || 1, h = canvas.clientHeight || 1;
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix(); frame();
    renderN(8);
  }
  const ro = new ResizeObserver(resize); ro.observe(canvas);
  if (canvas.parentElement) ro.observe(canvas.parentElement);
  resize();
  return { dispose() { disposed = true; cancelAnimationFrame(raf); ro.disconnect(); renderer.dispose(); } };
}

window.__mountBottle = (canvas, opts) => createBottleViewer(canvas, opts);
window.__mountChalk  = (canvas, opts) => createChalkViewer(canvas, opts);
window.__mountWordmark = (canvas, opts) => createWordmarkViewer(canvas, opts);
window.dispatchEvent(new Event('viewers-ready'));
</script>

<script>
(function(){
  const sky = document.getElementById('skyCanvas');
  const sg = sky.getContext('webgl2');
  if(!sg) return;

  const SV=`#version 300 es
  precision highp float;
  const vec2 P[4]=vec2[4](vec2(-1,-1),vec2(1,-1),vec2(-1,1),vec2(1,1));
  out vec2 vUV;
  void main(){gl_Position=vec4(P[gl_VertexID],0,1);vUV=P[gl_VertexID]*.5+.5;}`;

  const SF=`#version 300 es
  precision highp float;
  in vec2 vUV;
  out vec4 o;
  uniform float uTime;
  uniform vec2 uRes;

  // ── Simplex-style 3D noise (compact) ──
  vec4 perm(vec4 x){return mod(((x*34.)+1.)*x,289.);}
  float snoise3(vec3 v){
    const vec2 C=vec2(1./6.,1./3.);
    const vec4 D=vec4(0,.5,1,2);
    vec3 i=floor(v+dot(v,C.yyy)),x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz),l=1.-g;
    vec3 i1=min(g,l.zxy),i2=max(g,l.zxy);
    vec3 x1=x0-i1+C.x,x2=x0-i2+C.y,x3=x0-.5;
    i=mod(i,289.);
    vec4 p=perm(perm(perm(i.z+vec4(0,i1.z,i2.z,1))+i.y+vec4(0,i1.y,i2.y,1))+i.x+vec4(0,i1.x,i2.x,1));
    vec4 j=p-49.*floor(p/49.);
    vec4 x_=floor(j/7.),y_=floor(j-7.*x_);
    vec4 x2_=(x_*2.+.5)/7.-1.,y2_=(y_*2.+.5)/7.-1.;
    vec4 h=1.-abs(x2_)-abs(y2_);
    vec4 b0=vec4(x2_.xy,y2_.xy),b1=vec4(x2_.zw,y2_.zw);
    vec4 s0=floor(b0)*2.+1.,s1=floor(b1)*2.+1.;
    vec4 sh=-step(h,vec4(0));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy,a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 g0=vec3(a0.xy,h.x),g1=vec3(a0.zw,h.y),g2=vec3(a1.xy,h.z),g3=vec3(a1.zw,h.w);
    vec4 norm=1.79284291400159-.85373472095314*vec4(dot(g0,g0),dot(g1,g1),dot(g2,g2),dot(g3,g3));
    g0*=norm.x;g1*=norm.y;g2*=norm.z;g3*=norm.w;
    vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
    m*=m; m*=m;
    return 42.*dot(m,vec4(dot(g0,x0),dot(g1,x1),dot(g2,x2),dot(g3,x3)));
  }

  // FBM using 3D simplex 4 octaves like the reference
  float fbm3(vec3 p){
    float v=0.,a=.5;
    for(int i=0;i<3;i++){v+=snoise3(p)*a;p*=2.0;a*=.5;}
    return v*.5+.5;
  }

  // Levels: gamma correct a range-clamped value (matches reference levels.glsl)
  float levels(float c, float lo, float gamma, float hi){
    float r=clamp((c-lo)/(hi-lo),0.,1.);
    return pow(r,1./gamma);
  }

  void main(){
    vec2 uv=vUV;
    float ar=uRes.x/uRes.y;
    float t=uTime;

    // Sky gradient
    vec3 skyTop=vec3(.12,.28,.65);
    vec3 skyMid=vec3(.35,.55,.88);
    vec3 skyBot=vec3(.6,.78,.95);
    vec3 sky=uv.y>.5?mix(skyMid,skyTop,smoothstep(.5,1.,uv.y)):mix(skyBot,skyMid,smoothstep(0.,.5,uv.y));

    // ── Cloud layer slow drift + animate ──
    vec2 cp=vec2(uv.x*ar + t*0.005, uv.y + t*0.002);

    // Pass 1: large-scale FBM displaces UV (billowy warp)
    float nBig=fbm3(vec3(cp*17.8, t*0.002));
    vec2 warped=cp+nBig*0.04;

    // Pass 2: smaller simplex displaces again (detail warp)
    float nSmall=snoise3(vec3(warped*2.7, t*0.0015));
    warped+=nSmall*0.08;

    // Two scrolling noise samples drifting with the clouds
    float n1=fbm3(vec3(cp.x,cp.y-t*0.003,t*0.001)*4.);
    float n2=fbm3(vec3(cp.x+5.,cp.y+3.,t*0.001)*4.);

    // Levels on combined noise → alpha mask
    float alpha=levels((n1+n2)*0.6,0.2,0.4,0.7);

    // Shape from warped coordinates
    float shape=fbm3(vec3(warped*3., t*0.0008));
    shape=smoothstep(.35,.65,shape);

    alpha*=shape;
    alpha*=smoothstep(0.,.25,uv.y); // fade at horizon

    // Cloud color lit white, slight shadow in thin areas
    vec3 cloudCol=mix(vec3(.78,.82,.9),vec3(1),smoothstep(0.,.8,alpha));

    vec3 col=mix(sky,cloudCol,min(alpha,1.));

    // Horizon haze
    col=mix(col,vec3(.72,.8,.92),smoothstep(.2,0.,uv.y)*.35);

    o=vec4(col,1);
  }`;

  function cs(s,t){const sh=sg.createShader(t);sg.shaderSource(sh,s);sg.compileShader(sh);if(!sg.getShaderParameter(sh,sg.COMPILE_STATUS))console.error(sg.getShaderInfoLog(sh));return sh;}
  const prog=sg.createProgram();
  sg.attachShader(prog,cs(SV,sg.VERTEX_SHADER));
  sg.attachShader(prog,cs(SF,sg.FRAGMENT_SHADER));
  sg.linkProgram(prog);
  const vao=sg.createVertexArray();
  const uTime=sg.getUniformLocation(prog,'uTime');
  const uRes=sg.getUniformLocation(prog,'uRes');

  // Half-res clouds are soft, don't need full DPR
  function loop(t){
    const w=window.innerWidth;
    const h=window.innerHeight;
    if(sky.width!==w||sky.height!==h){sky.width=w;sky.height=h;}
    sg.viewport(0,0,w,h);
    sg.useProgram(prog);
    sg.uniform1f(uTime,t*.003);
    sg.uniform2f(uRes,w,h);
    sg.bindVertexArray(vao);
    sg.drawArrays(sg.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

  float sn(vec2 p,float s){return gn(p+vec2(s*1.7171,s*2.3131));}
  float fbm(vec2 p,float s,int o,float l,float g){float v=0.,a=1.,f=1.,m=0.;for(int i=0;i<8;i++){if(i>=o)break;v+=sn(p*f,s)*a;m+=a;a*=g;f*=l;}return v/m;}
  float ridged(vec2 p,float s,int o,float l,float g){float v=0.,a=1.,f=1.,m=0.;for(int i=0;i<8;i++){if(i>=o)break;float n=1.-abs(sn(p*f,s));n*=n;v+=n*a;m+=a;a*=g;f*=l;}return v/m;}
  float turb(vec2 p,float s,int o,float l,float g){float v=0.,a=1.,f=1.,m=0.;for(int i=0;i<8;i++){if(i>=o)break;v+=abs(sn(p*f,s))*a;m+=a;a*=g;f*=l;}return v/m;}

  float panelSDF(vec2 p,vec4 pn){vec2 c=pn.xy+pn.zw*.5;vec2 d=abs(p-c)-pn.zw*.5;if(d.x>0.&&d.y>0.)return length(d);return max(d.x,d.y);}
  float warpPanel(vec2 p,vec4 pn,float bS,float bL,float bG){
    float sd=panelSDF(p,pn); float dw=uEdgeAmt*.8; float fq=uEdgeFreq/1000.;
    float wx=p.x+fbm(p*fq*.8,bS+7777.,3,bL,bG)*dw;
    float wy=p.y+fbm(vec2(p.x*fq*.8+99.,p.y*fq*.8+99.),bS+7777.,3,bL,bG)*dw;
    vec2 wp=vec2(wx,wy); int eo=uEdgeDetail;
    float w=fbm(wp*fq,bS+5555.,eo+2,bL,bG)*uEdgeAmt
           +fbm(wp*fq*3.2,bS+6666.,eo+1,bL+.3,bG)*uEdgeAmt*.4
           +fbm(wp*fq*8.,bS+7777.,eo,bL+.5,bG-.05)*uEdgeAmt*.15;

  }

  void main(){
    // Pixel coords with scroll offset applied so terrain scrolls
    vec2 px=vec2(vUV.x, 1.-vUV.y)*uRes;
    float worldY = px.y + uScrollY;
    float x=px.x, y=worldY;

    float seed=uSeed, freq=uScale/150., depth=uHeight/12.;
    int oct=uOctaves; float lac=uLac, gain=uGain, warp=uWarp;

    // Domain warp
    float dwx=x+fbm(vec2(x,y)*.004,seed+333.,3,lac,gain)*warp;
    float dwy=y+fbm(vec2(x+50.,y+50.)*.004,seed+777.,3,lac,gain)*warp;
    vec2 p1=vec2(dwx,dwy)*freq*.25, p2=vec2(dwx,dwy)*freq*.7;

    // Hybrid noise
    float primary=ridged(p1,seed,oct,lac,gain)*.4
                 +fbm(p2,seed+333.,oct,lac+.05,gain)*.35
                 +turb(vec2(x,y)*freq*2.5,seed+777.,max(1,oct-2),lac,gain)*.12*uRough;
    float mega=fbm(vec2(x,y)*freq*.08,seed+333.,3,lac,gain);
    float crack=1.-pow(abs(fbm(vec2(dwx,dwy)*freq*1.2,seed+1111.,oct,lac,gain)),.2);
    float h=mega*.2+primary-crack*.2*uCracks;
    h=max(.03,h)*depth;

    // Detail channels
    float sW=fbm(vec2(x,y)*.002,seed+333.,3,lac,gain)*(60.+warp*.3)+fbm(vec2(x,y)*.008,seed+1111.,2,lac,gain)*25.;
    float strata=(sin((y+sW)*.05)*.5+.5)*uStrata;
    float veinN=fbm(vec2(dwx,dwy)*.008+50.,seed+777.,max(3,oct),lac+.2,gain);
    float veins=pow(max(0.,1.-abs(veinN)*5.),4.)*uVeins;
    float pitting=pow(turb(vec2(x,y)*.04,seed+1111.,4,2.5,.45),1.5)*uPitting;
    float colorVar=fbm(vec2(dwx,dwy)*.003+100.,seed,4,lac,gain)*uDrift;

    // Panels: cut and recess (in viewport pixel space, no scroll offset)
    float minCut=999., minRec=999.;
    for(int i=0;i<16;i++){
      if(i>=uPanelCount) break;
      float d=warpPanel(px, uPanels[i], seed, lac, gain);
      if(uPanelTypes[i]==0) minCut=min(minCut,d);
      else minRec=min(minRec,d);
    }

    if(minCut<0.){ outGeo=vec4(0,0,0,0); outDetail=vec4(0); return; }

    float edgeDist=min(minCut,minRec);
    bool inRecess=minRec<0.;

    if(inRecess){float rW=20.,rF=depth*.02,rD=-minRec;if(rD>rW)h=rF;else{float t=rD/rW;t=t*t;h=h*(1.-t)+rF*t;}}
    if(edgeDist<uLipWidth&&edgeDist>0.){float t=1.-edgeDist/uLipWidth;h+=t*t*depth*.6*(.6+fbm(px*.06,seed+5555.,3,2.,.5)*.8);}

    float eM=min(min(px.x,uRes.x-1.-px.x),min(px.y,uRes.y-1.-px.y));
    if(eM<4.)h*=eM/4.;
    h=clamp(h,0.,1.);
    outGeo=vec4(h,0,0,0);
    outDetail=vec4(strata,veins,pitting,colorVar);
  }`;

  // ── Shading: sandstone material ──
  const SF = `#version 300 es
  precision highp float;
  in vec2 vUV; out vec4 outColor;
  uniform sampler2D uGeoTex, uDetailTex;
  uniform vec2 uRes;
  uniform vec3 uCol0,uCol1,uCol2,uCol3;
  uniform vec4 uWeights;
  uniform float uMatStrata,uMatVeins,uMatPitting,uMatSpec,uMatRough;
  uniform vec3 uLightDir,uFillDir,uLightColor;
  uniform float uBrightness,uAmbient,uNormalStr;

  void main(){
    vec2 tx=1./uRes;
    vec4 geo=texture(uGeoTex,vUV); vec4 det=texture(uDetailTex,vUV);
    float h=geo.r;
    if(h<.001){outColor=vec4(0,0,0,0);return;}
    float hL=texture(uGeoTex,vUV+vec2(-tx.x,0)).r,hR=texture(uGeoTex,vUV+vec2(tx.x,0)).r;
    float hU=texture(uGeoTex,vUV+vec2(0,tx.y)).r,hD=texture(uGeoTex,vUV+vec2(0,-tx.y)).r;
    vec3 N=normalize(vec3((hL-hR)*uNormalStr,(hU-hD)*uNormalStr,1.));
    float strata=det.r,veins=det.g,pitting=det.b,colorV=det.a;
    float diff=max(0.,dot(N,uLightDir)),fill=max(0.,dot(N,uFillDir))*.25;
    vec3 halfV=normalize(uLightDir+vec3(0,0,1));
    float spec=pow(max(0.,dot(N,halfV)),20.+(1.-uMatRough)*80.)*uMatSpec;
    vec3 mc=uCol0;
    mc=mix(mc,uCol1,strata*uMatStrata*uWeights.y);
    mc=mix(mc,uCol2,(1.-h)*uWeights.z*.6+pitting*uMatPitting*uWeights.z*.4);
    mc=mix(mc,uCol3,veins*uMatVeins*uWeights.w);
    mc+=vec3(colorV*20.-10.,colorV*15.-8.,colorV*10.-5.);
    mc*=1.-pitting*uMatPitting*.2;
    float lit=uAmbient+(diff*.7+fill)*uBrightness;
    vec3 color=mc/255.*lit*uLightColor+spec*(200./255.)*uLightColor*uBrightness;
    color*=.65+h*.35;
    outColor=vec4(clamp(color,0.,1.),1);
  }`;

  function cs(s,t){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
  function lp(v,f){const p=gl.createProgram();gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(p));return p;}
  const vert=cs(VERT,gl.VERTEX_SHADER);
  const hP=lp(vert,cs(HF,gl.FRAGMENT_SHADER));
  const sP=lp(vert,cs(SF,gl.FRAGMENT_SHADER));

  let t0,t1,fbo,curW=0,curH=0;
  const vao=gl.createVertexArray();

  function mkTex(w,h){const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA32F,w,h,0,gl.RGBA,gl.FLOAT,null);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);return t;}

  function ensureFBO(w,h){
    if(w===curW&&h===curH) return;
    if(t0)gl.deleteTexture(t0);if(t1)gl.deleteTexture(t1);if(fbo)gl.deleteFramebuffer(fbo);
    t0=mkTex(w,h);t1=mkTex(w,h);
    fbo=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t0,0);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT1,gl.TEXTURE_2D,t1,0);
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    curW=w;curH=h;
  }

  function setU(p,n,t,v){const l=gl.getUniformLocation(p,n);if(!l)return;if(t==='1i')gl.uniform1i(l,v);else if(t==='1f')gl.uniform1f(l,v);else if(t==='2f')gl.uniform2f(l,v[0],v[1]);else if(t==='3f')gl.uniform3f(l,v[0],v[1],v[2]);else if(t==='4f')gl.uniform4f(l,v[0],v[1],v[2],v[3]);}

  // Collect panels from visible data-rock elements
  // getBoundingClientRect returns CSS viewport coords; canvas pixels = CSS * (canvasW/cssW)
  function collectPanels(){
    const panels=[];
    const W=canvas.width, H=canvas.height;
    const sx=W/window.innerWidth, sy=H/window.innerHeight;
    document.querySelectorAll('[data-rock]').forEach(el=>{
      if(panels.length>=16) return;
      const r=el.getBoundingClientRect();
      const x=r.left*sx, y=r.top*sy, w=r.width*sx, h=r.height*sy;
      if(y+h<0||y>H) return; // off-screen, skip
      const pad=8*sx;
      panels.push({x:x-pad, y:y-pad, w:w+pad*2, h:h+pad*2, type:el.dataset.rock});
    });
    return panels;
  }

  function render(){
    const W=canvas.width, H=canvas.height;
    ensureFBO(W,H);
    const contentEl=document.querySelector('.content');
    const scrollY=contentEl?contentEl.scrollTop:0;
    const sy=H/window.innerHeight;
    const panels=collectPanels();

    gl.clearColor(0,0,0,0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.bindVertexArray(vao);

    // Pass 1: heightmap
    gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
    gl.drawBuffers([gl.COLOR_ATTACHMENT0,gl.COLOR_ATTACHMENT1]);
    gl.viewport(0,0,W,H);
    gl.useProgram(hP);
    setU(hP,'uRes','2f',[W,H]);
    const C = ROCK_CFG.primary, M = C.mat, Lt = C.light;
    setU(hP,'uSeed','1f',C.seed);
    setU(hP,'uScale','1f',C.scale);
    setU(hP,'uHeight','1f',C.height);
    setU(hP,'uRough','1f',C.rough);
    setU(hP,'uOctaves','1i',C.octaves);
    setU(hP,'uLac','1f',C.lac);
    setU(hP,'uGain','1f',C.gain);
    setU(hP,'uWarp','1f',C.warp);
    setU(hP,'uStrata','1f',C.strata);
    setU(hP,'uVeins','1f',C.veins);
    setU(hP,'uCracks','1f',C.cracks);
    setU(hP,'uPitting','1f',C.pitting);
    setU(hP,'uDrift','1f',C.drift);
    setU(hP,'uScrollY','1f',scrollY*sy);

    setU(hP,'uPanelCount','1i',panels.length);
    for(let i=0;i<16;i++){
      if(i<panels.length){const p=panels[i];setU(hP,`uPanels[${i}]`,'4f',[p.x,p.y,p.w,p.h]);setU(hP,`uPanelTypes[${i}]`,'1i',p.type==='cut'?0:1);}
      else{setU(hP,`uPanels[${i}]`,'4f',[0,0,0,0]);setU(hP,`uPanelTypes[${i}]`,'1i',0);}
    }
    setU(hP,'uEdgeAmt','1f',C.edgeAmt);
    setU(hP,'uEdgeFreq','1f',C.edgeFreq);
    setU(hP,'uEdgeDetail','1i',C.edgeDetail);
    setU(hP,'uLipWidth','1f',C.lipWidth);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // Pass 2: shade
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    gl.viewport(0,0,W,H);
    gl.useProgram(sP);
    setU(sP,'uRes','2f',[W,H]);
    setU(sP,'uGeoTex','1i',0);
    setU(sP,'uDetailTex','1i',1);
    // Material (from ROCK_CONFIG)
    setU(sP,'uCol0','3f',M.col0);
    setU(sP,'uCol1','3f',M.col1);
    setU(sP,'uCol2','3f',M.col2);
    setU(sP,'uCol3','3f',M.col3);
    setU(sP,'uWeights','4f',M.weights);
    setU(sP,'uMatStrata','1f',M.strata);
    setU(sP,'uMatVeins','1f',M.veins);
    setU(sP,'uMatPitting','1f',M.pitting);
    setU(sP,'uMatSpec','1f',M.spec);
    setU(sP,'uMatRough','1f',M.rough);
    // Lighting (from ROCK_CONFIG)
    const aR=Lt.angle*Math.PI/180,eR=Lt.elev*Math.PI/180,cE=Math.cos(eR);
    const lx=cE*Math.cos(aR),ly=-Math.sin(eR),lz=cE*Math.sin(aR),ll=Math.sqrt(lx*lx+ly*ly+lz*lz);
    const fx=-lx/ll*.3,fy=-.2,fz=lz/ll*.3+.5,fl=Math.sqrt(fx*fx+fy*fy+fz*fz);
    setU(sP,'uLightDir','3f',[lx/ll,ly/ll,lz/ll]);
    setU(sP,'uFillDir','3f',[fx/fl,fy/fl,fz/fl]);
    setU(sP,'uBrightness','1f',Lt.brightness);
    setU(sP,'uAmbient','1f',Lt.ambient);
    setU(sP,'uLightColor','3f',Lt.color);
    setU(sP,'uNormalStr','1f',Lt.normalStr);

    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,t0);
    gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,t1);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    gl.bindVertexArray(null);
  }

  // ── Rock slab frames: each .slab-canvas gets its own GL context ──
  const slabs = new Map(); // canvas element → {gl, hP, sP, t0, t1, fbo, vao, rw, rh, seed}
  let slabSeed = 137;

  function initSlab(nc) {
    if (slabs.has(nc)) return slabs.get(nc);
    const g = nc.getContext('webgl2', {antialias:false, premultipliedAlpha:false});
    if (!g) return null;
    g.getExtension('EXT_color_buffer_float');
    function sc(s,t){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
    function lk(v,f){const p=g.createProgram();g.attachShader(p,v);g.attachShader(p,f);g.linkProgram(p);return p;}
    const v=sc(VERT,g.VERTEX_SHADER);
    const s = {gl:g, hP:lk(v,sc(HF,g.FRAGMENT_SHADER)), sP:lk(v,sc(SF,g.FRAGMENT_SHADER)), vao:g.createVertexArray(), t0:null, t1:null, fbo:null, rw:0, rh:0, seed:slabSeed};
    slabSeed += 71;
    slabs.set(nc, s);
    return s;
  }

  function slabSetU(g, p, n, t, v) {
    const l=g.getUniformLocation(p,n);if(!l)return;
    if(t==='1i')g.uniform1i(l,v);else if(t==='1f')g.uniform1f(l,v);
    else if(t==='2f')g.uniform2f(l,v[0],v[1]);else if(t==='3f')g.uniform3f(l,v[0],v[1],v[2]);
    else if(t==='4f')g.uniform4f(l,v[0],v[1],v[2],v[3]);
  }

  function ensureSlabFBO(s, w, h) {
    if(w===s.rw&&h===s.rh) return;
    const g=s.gl;
    function mt(w,h){const t=g.createTexture();g.bindTexture(g.TEXTURE_2D,t);g.texImage2D(g.TEXTURE_2D,0,g.RGBA32F,w,h,0,g.RGBA,g.FLOAT,null);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MIN_FILTER,g.NEAREST);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MAG_FILTER,g.NEAREST);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_WRAP_S,g.CLAMP_TO_EDGE);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_WRAP_T,g.CLAMP_TO_EDGE);return t;}
    if(s.t0)g.deleteTexture(s.t0);if(s.t1)g.deleteTexture(s.t1);if(s.fbo)g.deleteFramebuffer(s.fbo);
    s.t0=mt(w,h);s.t1=mt(w,h);
    s.fbo=g.createFramebuffer();g.bindFramebuffer(g.FRAMEBUFFER,s.fbo);
    g.framebufferTexture2D(g.FRAMEBUFFER,g.COLOR_ATTACHMENT0,g.TEXTURE_2D,s.t0,0);
    g.framebufferTexture2D(g.FRAMEBUFFER,g.COLOR_ATTACHMENT1,g.TEXTURE_2D,s.t1,0);
    g.bindFramebuffer(g.FRAMEBUFFER,null);
    s.rw=w;s.rh=h;
  }

  function renderSlabs() {
    document.querySelectorAll('.slab-canvas').forEach(nc => {
      let s = slabs.get(nc);
      if (!s) s = initSlab(nc);
      if (!s) return;
      const g = s.gl;
      const frame = nc.parentElement;
      const dpr = window.devicePixelRatio || 1;             // render at full native screen resolution
      const cssW = frame.offsetWidth, cssH = frame.offsetHeight;
      const cw = Math.round(cssW * dpr);
      const ch = Math.round(cssH * dpr);

      // Collect cut panels inside this frame
      const frameRect = frame.getBoundingClientRect();
      const sx = cw/cssW, sy = ch/cssH;
      const cuts = [];
      frame.querySelectorAll('[data-slab-cut]').forEach(el => {
        if(cuts.length>=16) return;
        const r = el.getBoundingClientRect();
        const pad = 4*sx;
        cuts.push({
          x: (r.left - frameRect.left)*sx - pad,
          y: (r.top - frameRect.top)*sy - pad,
          w: r.width*sx + pad*2,
          h: r.height*sy + pad*2,
        });
      });

      // Build a cache key from size + panel rects
      const key = cw+'x'+ch+'_'+cuts.map(c=>Math.round(c.x)+','+Math.round(c.y)+','+Math.round(c.w)+','+Math.round(c.h)).join(';');
      if(s.cacheKey===key) return;
      s.cacheKey=key;

      if(nc.width!==cw||nc.height!==ch){nc.width=cw;nc.height=ch;}
      ensureSlabFBO(s,cw,ch);

      const S = (p,n,t,v) => slabSetU(g,p,n,t,v);
      g.bindVertexArray(s.vao);

      // Heightmap
      g.bindFramebuffer(g.FRAMEBUFFER,s.fbo);
      g.drawBuffers([g.COLOR_ATTACHMENT0,g.COLOR_ATTACHMENT1]);
      g.viewport(0,0,cw,ch);
      g.useProgram(s.hP);
      const C = ROCK_CFG.secondary, M = C.mat, Lt = C.light;
      S(s.hP,'uRes','2f',[cw,ch]);
      S(s.hP,'uSeed','1f',s.seed);   // per-slab seed kept for frame-to-frame variation
      S(s.hP,'uScale','1f',C.scale);
      S(s.hP,'uHeight','1f',C.height);
      S(s.hP,'uRough','1f',C.rough);
      S(s.hP,'uOctaves','1i',C.octaves);
      S(s.hP,'uLac','1f',C.lac);
      S(s.hP,'uGain','1f',C.gain);
      S(s.hP,'uWarp','1f',C.warp);
      S(s.hP,'uStrata','1f',C.strata);
      S(s.hP,'uVeins','1f',C.veins);
      S(s.hP,'uCracks','1f',C.cracks);
      S(s.hP,'uPitting','1f',C.pitting);
      S(s.hP,'uDrift','1f',C.drift);
      S(s.hP,'uScrollY','1f',0);
      S(s.hP,'uPanelCount','1i',cuts.length);
      for(let i=0;i<16;i++){
        if(i<cuts.length){S(s.hP,`uPanels[${i}]`,'4f',[cuts[i].x,cuts[i].y,cuts[i].w,cuts[i].h]);S(s.hP,`uPanelTypes[${i}]`,'1i',0);}
        else{S(s.hP,`uPanels[${i}]`,'4f',[0,0,0,0]);S(s.hP,`uPanelTypes[${i}]`,'1i',0);}
      }
      S(s.hP,'uEdgeAmt','1f',C.edgeAmt);
      S(s.hP,'uEdgeFreq','1f',C.edgeFreq);
      S(s.hP,'uEdgeDetail','1i',C.edgeDetail);
      S(s.hP,'uLipWidth','1f',C.lipWidth);
      g.drawArrays(g.TRIANGLE_STRIP,0,4);

      // Shade
      g.bindFramebuffer(g.FRAMEBUFFER,null);
      g.viewport(0,0,cw,ch);
      g.useProgram(s.sP);
      S(s.sP,'uRes','2f',[cw,ch]);
      S(s.sP,'uGeoTex','1i',0);
      S(s.sP,'uDetailTex','1i',1);
      S(s.sP,'uCol0','3f',M.col0);
      S(s.sP,'uCol1','3f',M.col1);
      S(s.sP,'uCol2','3f',M.col2);
      S(s.sP,'uCol3','3f',M.col3);
      S(s.sP,'uWeights','4f',M.weights);
      S(s.sP,'uMatStrata','1f',M.strata);
      S(s.sP,'uMatVeins','1f',M.veins);
      S(s.sP,'uMatPitting','1f',M.pitting);
